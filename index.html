<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ping Test - ping-test.online</title>
    <meta name="description"
          content="Feel free to use our ping test.Results are close to ICMP ping (via cmd or console).">
    <link rel="icon" href="/static/img/favicon.svg" sizes="any" type="image/svg+xml"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"
          integrity="sha512-jnSuA4Ss2PkkikSOLtYs8BlYIeeIK1h99ty4YfvRPAlzr377vr3CXDb7sb7eEEBYjDtcYj+AjBH3FLv5uSJuXg=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
          integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <style>
        .terminal {
            background-color: #222;
            color: #fff;
            padding: 20px;
            border-radius: 5px;
        }

        .output {
            overflow-y: scroll;
            height: 100px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex flex-column align-items-center">
        <div class="w-100" style="max-width: 992px;position:relative;">
            <div class="d-flex mt-5 justify-content-center align-items-center">
                <img src="/static/img/favicon.svg" alt="logo" style="height: 40px"/>
                <a class="fs-1 fw-bold text-success text-decoration-none" href="/">PING-TEST.ONLINE</a>
            </div>
            <label for="mySelect"></label>
            <select class="form-select" id="mySelect">
                <option value="https://www.google.com">ping www.google.com</option>
                <option value="https://www.baidu.com">ping www.baidu.com</option>
            </select>
            <div class="mt-3 text-center">
                <button type="button" class="btn btn-success" id="startPingTest">Start Ping Test</button>
            </div>
            <div class="terminal mt-3">
                <div class="output">
                </div>
            </div>
            <table class="table mt-3">
                <thead>
                <tr>
                    <th scope="col">min</th>
                    <th scope="col">avg</th>
                    <th scope="col">max</th>
                    <th scope="col">time out</th>
                    <th scope="col">total</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td id="min"></td>
                    <td id="avg"></td>
                    <td id="max"></td>
                    <td id="timeout">0</td>
                    <td id="total">0</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="text-center my-5">© PING-TEST.ONLINE</div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"
        integrity="sha512-7Pi/otdlbbCR+LnW+F7PwFcSDJOuUJB3OxtEHbg4vSMvzvJjde4Po1v4BR9Gdc9aXNUNFVUY+SK51wWT8WF0Gg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
    $(document).ready(function () {
        const mySelect = $("#mySelect");
        let start = false;
        let firstPing = true;
        const $startPingTest = $('#startPingTest');
        const $output = $('.output');
        const $min = $('#min');
        const $avg = $('#avg');
        const $max = $('#max');
        const $timeout = $('#timeout');
        const $total = $('#total');
        let totalMs = 0;
        let min = 0;
        let avg = 0;
        let max = 0;
        let timeout = 0;
        let total = 0;

        function init() {
            totalMs = 0;
            min = 0;
            avg = 0;
            max = 0;
            timeout = 0;
            total = 0;
        }

        function addCommandLine(str) {
            if (firstPing) {
                firstPing = false;
                init();
                return;
            }
            $output.append('<div class="command">' + str + '</div>');
            const commandElements = $('.command');
            if (commandElements.length > 20) {
                commandElements.first().remove();
            }
            $output.animate({
                scrollTop: $(document).height()
            }, 'fast');
            if (min > 0) {
                $min.text(min + ' ms');
            }
            const success = total - timeout
            if (totalMs > 0 && success > 0) {
                avg = Math.floor(totalMs / success)
                $avg.text(avg + ' ms');
            }
            if (max > 0) {
                $max.text(max + ' ms');
            }
            $timeout.text(timeout);
            $total.text(total);
        }

        function startPingTest() {
            $output.empty();

            function ping(url) {
                total++;
                if (!start) return;
                let timeOut = false;
                const url2 = new URL(url);
                const protocol = url2.protocol;
                const hostname = url2.hostname;
                const startTime = Date.now();
                const img = new Image();
                let timer = setTimeout(() => {
                    timeOut = true;
                    timeout++;
                    addCommandLine('ping ' + hostname + ' timeout')
                    ping(url);
                }, 4000);
                img.referrerPolicy = 'no-referrer';
                img.src = protocol + '//' + hostname + '/favicon.ico?t=' + startTime;
                img.onload = () => {
                    clearTimeout(timer);
                    if (!timeOut) {
                        const endTime = Date.now();
                        const duration = endTime - startTime;
                        totalMs += duration
                        if (duration < min || min === 0) {
                            min = duration;
                        }
                        if (duration > max) {
                            max = duration;
                        }
                        addCommandLine('ping ' + hostname + ' ' + duration + ' ms')
                        setTimeout(() => {
                            ping(url);
                        }, 1000);
                    }
                };
                img.onerror = () => {
                    clearTimeout(timer);
                    if (!timeOut) {
                        setTimeout(() => {
                            ping(url);
                        }, 1000);
                    }
                };
            }

            ping(mySelect.val());
        }

        $startPingTest.click(function () {
            if (!start) {
                start = true;
                startPingTest();
                $startPingTest.text('Stop');
            } else {
                start = false;
                init();
                $startPingTest.text('Start Ping Test');
            }
        });
    })
</script>

</body>
</html>
